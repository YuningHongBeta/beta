schema: beta-bgo-th-tlc-rate-overlay-v7
tag: kamada_k11_rate_gate_scan_s8302026
build_dir: build_rateoverlay
events: 20000
seed: 8302026
threads: 2

# Kamada-inspired K1.1 rate estimate: 1e7 pi+/s times a 1 us BGO window.
# The 4/10/20/50 ns TH/TLC full-width gates are a sensitivity scan, not
# measured beta detector gates. Every rectangular gate is centered on the
# signal vertex at target-center t=0 and therefore includes particle TOF.
beam:
  particle: pi+
  momentum_mev_c: 1100
  multiplicity_mode: poisson
  fixed_multiplicity: 1
  mean_per_bgo_gate: 10
  bgo_gate_width_ns: 1000
  hodo_gate_width_ns: [4, 10, 20, 50]
  profile_model: pencil
  x_mean_mm: 0
  y_mean_mm: 0
  x_sigma_mm: 0
  y_sigma_mm: 0
  x_max_abs_mm: 0
  y_max_abs_mm: 0
target:
  material: Li6_90pct
  areal_density_g_cm2: 14.1
  density_g_cm3: 0.47
  radius_mm: 15
signal:
  pim_momentum_mev_c: 105.4
  pi0_momentum_mev_c: 100
geometries:
  - name: u15x15_t1
    n_layer: 15
    n_sector: 15
    segmentation: uniform_theta
    geometry_mode: current
    photon_counter: none
    bgo_z_offset_cm: 0
    theta_min_deg: 5.666
    theta_max_deg: 170.302
# Generate clean controls under the same detector gate; the 4 ns point can
# otherwise fold signal TOF acceptance into the inferred beam degradation.
primaries: [e, pim, pi0, beam, e_beam, pim_beam, pi0_beam]
lsf:
  queue: l
  wall_minutes: 720
  memory_mb: 4096
